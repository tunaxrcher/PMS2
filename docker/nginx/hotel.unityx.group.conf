# /etc/nginx/sites-available/hotel.unityx.group

server {
    listen 80;
    server_name hotel.unityx.group;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hotel.unityx.group;

    # SSL (certbot จะเติมให้อัตโนมัติ)
    ssl_certificate /etc/letsencrypt/live/hotel.unityx.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotel.unityx.group/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # === NestJS API — port 6001 ===
    location /api {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Next.js Frontend — port 6000 ===
    location / {
        proxy_pass http://127.0.0.1:6000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
